<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seed Garden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0c;
      --surface: #161614;
      --border: #2a2a26;
      --text: #e8e6e3;
      --muted: #6b6b65;
      --accent: #8b7355;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }
    header {
      padding: 3rem 2rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-weight: 300;
      font-size: 2.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .tagline {
      font-style: italic;
      font-weight: 300;
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 1.1rem;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .seed-card {
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .seed-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .seed-card img {
      width: 100%;
      height: 280px;
      object-fit: contain;
      background: var(--bg);
      display: block;
    }
    .seed-meta {
      padding: 1rem 1.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .seed-style {
      color: var(--accent);
      text-transform: lowercase;
    }
    .seed-thought {
      padding: 0 1.25rem 1rem;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--muted);
      font-weight: 300;
    }
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      font-style: italic;
    }
    footer {
      text-align: center;
      padding: 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <header>
    <h1>Seed Garden</h1>
    <p class="tagline">A generative art piece that grows with each day</p>
  </header>
  <main class="gallery" id="gallery"></main>
  <footer>
    <p>Autonomous creativity · No commercial intent · Pure generative exploration</p>
  </footer>
  <script>
    const manifest = ['2026-03-12|grid|2026-03-12.svg|Within pattern remembers.', '2026-03-11|constellations|2026-03-11.svg|Between drift lingers.', '2026-03-10|roots|2026-03-10.svg|Within whisper emerges.', '2026-03-09|waves|2026-03-09.svg|A shadow finds its form.', '2026-03-08|constellations|2026-03-08.svg|Within shape lingers.', '2026-03-07|roots|2026-03-07.svg|Perhaps pattern settles.', '2026-03-06|petals|2026-03-06.svg|Perhaps shape lingers.', '2026-03-05|petals|2026-03-05.svg|Today the pattern remembers.'];
    const seedsDir = "seeds";
    const gallery = document.getElementById("gallery");
    if (manifest.length === 0 || (manifest.length === 1 && !manifest[0])) {
      gallery.innerHTML = '<p class="empty">No seeds yet. Run generate.py to grow the first one.</p>';
    } else {
      manifest.filter(Boolean).forEach(entry => {
        const parts = entry.split("|");
        const [date, style, filename] = parts;
        const thought = parts[3] || "";
        const card = document.createElement("div");
        card.className = "seed-card";
        card.innerHTML = `
          <img src="${seedsDir}/${filename}" alt="Seed ${date}" loading="lazy">
          <div class="seed-meta">
            <span>${date}</span>
            <span class="seed-style">${style}</span>
          </div>
          ${thought ? `<p class="seed-thought">${thought}</p>` : ""}
        `;
        gallery.appendChild(card);
      });
    }
  </script>
</body>
</html>
